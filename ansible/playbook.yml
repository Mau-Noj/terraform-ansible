- name: Configurar Vaadin con Nginx
  hosts: all
  become: yes

  vars:
    app_dir: /opt/vaadin-app
    app_user: vaadin

  tasks:
    # ── 1. ESPERAR APT LIBRE ─────────────────────────
    - name: Esperar apt libre
      shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done

    # ── 2. DEPENDENCIAS ─────────────────────────────
    - name: Instalar dependencias
      apt:
        name:
          - openjdk-17-jdk
          - maven
          - git
          - nginx
        update_cache: yes
        state: present

    # ── 3. CREAR USUARIO ────────────────────────────
    - name: Crear usuario para la aplicación
      user:
        name: "{{ app_user }}"
        system: yes
        create_home: yes

    # ── 4. CLONAR APP ───────────────────────────────
    - name: Clonar repositorio de la app
      git:
        repo: 'https://github.com/Mau-Noj/mi-app-vaadin'
        dest: "{{ app_dir }}"
        version: master
        force: yes

    - name: Ajustar permisos
      file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # ── 5. BUILD ────────────────────────────────────
    - name: Build con Maven
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ app_dir }}/Ejemplo-Vaadin"
      become_user: "{{ app_user }}"
      environment:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    # ── 6. OBTENER JAR ──────────────────────────────
    - name: Obtener JAR
      set_fact:
        jar_path: "{{ app_dir }}/Ejemplo-Vaadin/target/Ejemplo-Vaadin-1.0-SNAPSHOT.jar"

    # ── 7. SYSTEMD ──────────────────────────────────
    - name: Crear servicio systemd
      copy:
        dest: /etc/systemd/system/vaadin.service
        content: |
          [Unit]
          Description=Vaadin App
          After=network.target

          [Service]
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}/Ejemplo-Vaadin
          ExecStart=/usr/bin/java -jar {{ jar_path }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Recargar systemd
      command: systemctl daemon-reload

    - name: Habilitar y arrancar Vaadin
      systemd:
        name: vaadin
        enabled: yes
        state: restarted

    # ── 8. ESPERAR APP (CLAVE 🔥) ───────────────────
    - name: Esperar a que la app responda
      wait_for:
        port: 8080
        delay: 10
        timeout: 120

    # ── 9. NGINX ────────────────────────────────────
    - name: Configurar Nginx
      copy:
        dest: /etc/nginx/sites-available/vaadin
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://localhost:8080;
                  proxy_http_version 1.1;

                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: Eliminar default nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Crear link nginx
      file:
        src: /etc/nginx/sites-available/vaadin
        dest: /etc/nginx/sites-enabled/vaadin
        state: link
        force: yes

    - name: Validar nginx
      command: nginx -t

    - name: Reiniciar nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes