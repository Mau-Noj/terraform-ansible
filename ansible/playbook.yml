- name: Configurar Vaadin con Nginx
  hosts: all
  become: yes

  vars:
    app_dir: /opt/vaadin-app
    app_user: vaadin

  tasks:
    # ── 1. ESPERAR APT LIBRE (FIX LOCK) ─────────────────────────
    - name: Esperar apt libre
      shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done

    # ── 2. DEPENDENCIAS ─────────────────────────────────────────
    - name: Instalar dependencias
      apt:
        name:
          - openjdk-17-jdk
          - maven
          - git
          - nginx
        update_cache: yes
        state: present

    # ── 3. CREAR USUARIO ────────────────────────────────────────
    - name: Crear usuario para la aplicación
      user:
        name: "{{ app_user }}"
        system: yes
        create_home: no

    # ── 4. CLONAR REPO (APP REAL, NO INFRA) ─────────────────────
    - name: Clonar repositorio de la app
      git:
        repo: 'https://github.com/TU_USUARIO/TU_APP_VAADIN.git'
        dest: "{{ app_dir }}"
        version: HEAD
        update: yes

    - name: Ajustar permisos del proyecto
      file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # ── 5. BUILD MAVEN (SIN PROFILE PROBLEMÁTICO) ───────────────
    - name: Build con Maven
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"
      environment:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    # ── 6. BUSCAR JAR ───────────────────────────────────────────
    - name: Encontrar el JAR
      find:
        paths: "{{ app_dir }}/target"
        patterns: "*.jar"
        excludes: "*-sources.jar"
      register: jar_files

    - name: Validar JAR
      fail:
        msg: "No se encontró ningún JAR"
      when: jar_files.files | length == 0

    - name: Guardar ruta del JAR
      set_fact:
        jar_path: "{{ jar_files.files[0].path }}"

    # ── 7. SYSTEMD ──────────────────────────────────────────────
    - name: Crear servicio systemd
      copy:
        dest: /etc/systemd/system/vaadin.service
        content: |
          [Unit]
          Description=Vaadin Java App
          After=network.target

          [Service]
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/java -jar {{ jar_path }}
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
      notify: Restart Vaadin

    # ── 8. NGINX ────────────────────────────────────────────────
    - name: Configurar Nginx
      copy:
        dest: /etc/nginx/sites-available/vaadin
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://localhost:8080;
                  proxy_http_version 1.1;

                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;

                  proxy_read_timeout 3600;
                  proxy_send_timeout 3600;
              }
          }
      notify: Restart Nginx

    - name: Habilitar sitio Nginx
      file:
        src: /etc/nginx/sites-available/vaadin
        dest: /etc/nginx/sites-enabled/vaadin
        state: link

    - name: Eliminar config default
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Validar configuración Nginx
      command: nginx -t
      changed_when: false

    # ── 9. SERVICIOS ────────────────────────────────────────────
    - name: Asegurar servicios activos
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - nginx
        - vaadin

  handlers:
    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted

    - name: Restart Vaadin
      systemd:
        name: vaadin
        state: restarted
        daemon_reload: yes